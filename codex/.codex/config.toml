model = "gpt-5.6-luna"
model_reasoning_effort = "high"
model_verbosity = "low"
hide_agent_reasoning = true
personality = "pragmatic"
service_tier = "default"
approvals_reviewer = "guardian_subagent"
network_access = true
notify = ["turn-ended"]
web_search = "live"
prevent_idle_sleep = true
responses_websockets_v2 = true
terminal_resize_reflow = true

[projects."/home/lance/dev/github/omny-frontend"]
trust_level = "trusted"

[projects."/home/lance"]
trust_level = "trusted"

[projects."/home/lance/documents"]
trust_level = "trusted"

[projects."/home/lance/dev/github/openwhoop"]
trust_level = "trusted"

[projects."/home/lance/dev/github/my-whoop"]
trust_level = "trusted"

[projects."/home/lance/dev/github/noop"]
trust_level = "trusted"

[projects."/home/lance/dev/github/noop/tools/linux-capture"]
trust_level = "trusted"

[projects."/home/lance/dev/github/resume"]
trust_level = "trusted"

[projects."/home/lance/music"]
trust_level = "trusted"

[projects."/home/lance/dev/github/dotfiles"]
trust_level = "trusted"

[agents]
max_threads = 4
max_depth = 2
job_max_runtime_seconds = 7200

[tui]
status_line = ["model-with-reasoning", "context-used", "git-branch", "pull-request-number", "branch-changes", "fast-mode"]
status_line_use_colors = true
session_picker_view = "comfortable"
terminal_title = ["activity", "app-name", "codex-version", "project-name"]
theme = "ansi"

[tui.model_availability_nux]
"gpt-5.5" = 4
"gpt-5.6-sol" = 4

[plugins."github@openai-curated"]
enabled = true

[notice]
hide_rate_limit_model_nudge = true
